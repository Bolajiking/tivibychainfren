# TVinBio production bridge host — single-box v1 (plan §7).
# Public ports: 443/tcp (ICE), 8443/tcp (TLS front for signaling + control).
# Everything else is loopback inside the shared network namespace.
services:
  mediamtx:
    # NOT the stock bluenviron/mediamtx image: that one is built FROM scratch
    # and carries no shell, so the runOnReady/runOnNotReady curl hooks that
    # drive the forwarder fail silently. See Dockerfile.mediamtx.
    build:
      context: .
      dockerfile: Dockerfile.mediamtx
    image: tvinbio/bridge-mediamtx:1.19.2
    restart: unless-stopped
    network_mode: host # raw TCP 443 ICE + loopback hooks to the agent
    volumes:
      - ../mediamtx.production.yml:/mediamtx.yml:ro
    # Start order only. NOT `condition: service_healthy`: the agent's /healthz
    # reports 503 until MediaMTX answers its API, so health-gating here would
    # deadlock — each service waiting on the other, forever.
    depends_on:
      - agent

  agent:
    # Built, not the stock node image: the forwarder shells out to ffmpeg, which
    # node:20-alpine does not carry. Dockerfile.agent pins it.
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    image: tvinbio/bridge-agent:1
    restart: unless-stopped
    network_mode: host
    working_dir: /opt/bridge
    command: ["node", "agent/index.mjs"]
    # Agent code is mounted so it can be updated without a rebuild; ffmpeg comes
    # from the image. The mount shadows the image's copy of agent/ — intended.
    volumes:
      - ../:/opt/bridge:ro
    environment:
      TVINBIO_BRIDGE_CONTROL_SECRET: ${TVINBIO_BRIDGE_CONTROL_SECRET:?set in .env}
      BRIDGE_PUBLIC_WHIP_BASE: ${BRIDGE_PUBLIC_WHIP_BASE:?e.g. https://bridge.example.com:8443}
      BRIDGE_CONTROL_PORT: "8091"
      BRIDGE_LOOPBACK_PORT: "9998"
      MEDIAMTX_API: "http://127.0.0.1:9997"
      MEDIAMTX_RTSP_BASE: "rtsp://127.0.0.1:8554"
    healthcheck:
      # Liveness only — did the process answer at all. Exits 0 on ANY HTTP
      # response including 503, and 1 only if the connection fails. `wget` is
      # wrong here: it exits non-zero on 503, and /healthz legitimately returns
      # 503 whenever MediaMTX is not answering its API, which would mark a
      # perfectly alive agent unhealthy. Readiness stays the app's business —
      # it health-checks the agent before routing any broadcast to it.
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:8091/healthz',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2.10
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data

volumes:
  caddy-data:
